environment:
  name: CarRacing-v3
  render_mode: rgb_array
  n_episodes: 5000
  log_interval: 10
  mode: dqn
  lap_complete_percent: 0.95
  domain_randomize: false
  checkpoint_interval: 20
seed: 42
dqn:
  algorithm: double_dqn
  use_continuous: true
  action_set: smooth
  frame_stack: 4
  action_repeat: 4
  hyperparameters:
    learning_rate: 0.0001
    discount_factor: 0.99
    epsilon: 1.0
    exploration_decay: 0.999
    final_epsilon: 0.05
    batch_size: 64
    replay_buffer_size: 50000
    target_update_freq: 500
    train_start: 5000
observation:
  method: feature
  n_bins: 6
  n_regions: 6
save_path: checkpoints/D_exploration/D1_dqn_explore_slow_decay
log_path: logs/D_exploration/D1_dqn_explore_slow_decay_log.csv
