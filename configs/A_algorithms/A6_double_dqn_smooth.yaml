environment:
  name: CarRacing-v3
  render_mode: rgb_array
  n_episodes: 5000
  log_interval: 10
  mode: dqn
  lap_complete_percent: 0.95
  domain_randomize: false
  checkpoint_interval: 20
seed: 42
dqn:
  algorithm: double_dqn
  use_continuous: true
  action_set: smooth
  hyperparameters:
    learning_rate: 0.0001
    discount_factor: 0.99
    epsilon: 1.0
    exploration_decay: 0.997
    final_epsilon: 0.05
    batch_size: 64
    replay_buffer_size: 50000
    target_update_freq: 500
    train_start: 5000
observation:
  method: feature
  n_bins: 6
  n_regions: 6
save_path: checkpoints/A_algorithms/A6_double_dqn_smooth
log_path: logs/A_algorithms/A6_double_dqn_smooth_log.csv
